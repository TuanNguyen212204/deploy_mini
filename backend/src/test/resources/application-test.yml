spring:
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    show-sql: true

  flyway:
    enabled: false # Tắt Flyway cho test để tránh conflict với H2

  h2:
    console:
      enabled: true # Có thể truy cập H2 console tại http://localhost:8080/h2-console