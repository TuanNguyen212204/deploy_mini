spring:
  # Local dev convenience:
  # - Cho phép đặt biến trong file `.env` dạng KEY=VALUE ngay tại thư mục `backend/`
  # - Render/Prod: không cần file này (optional), vẫn ưu tiên env vars của platform
  config:
    import: optional:file:.env.properties
  datasource:
    # Render/Prod: set via env vars (không hard-code secrets trong repo)
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      # Pool size 3 quá nhỏ → dễ cạn pool khi có vài request đồng thời.
      # Tăng lên mức an toàn hơn cho môi trường deploy mini.
      maximum-pool-size: 10
      minimum-idle: 2

      # Timeout acquire connection (ms)
      # 10s thường quá gắt với cold start/network → tăng lên để giảm 500 do timeout acquire.
      connection-timeout: 30000
      validation-timeout: 5000

      # Tránh churn connection: maxLifetime quá thấp (30s) sẽ khiến pool liên tục hủy/tạo lại.
      # Khuyến nghị ~30 phút, thấp hơn idle timeout của DB/proxy nếu có.
      max-lifetime: 1800000
      idle-timeout: 600000

      # Bật leak detection để phát hiện request giữ connection quá lâu (ms).
      leak-detection-threshold: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        # Statement timeout (seconds) để query không treo vô hạn
        jdbc:
          timeout: 10

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  cache:
    type: caffeine
    caffeine:
      # Default spec cho cache của app; TTL snapshot trending = 2h.
      spec: maximumSize=200,expireAfterWrite=7200s

server:
  # Render sẽ inject biến môi trường PORT; local thì fallback 8080
  port: ${PORT:8080}

logging:
  level:
    root: INFO
  file:
    name: logs/app.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30