spring:
  datasource:
    url: jdbc:postgresql://db.astkanfsacxriwprspqr.supabase.co:5432/postgres
    username: postgres
    password: "PriceHawl123@"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Nên thêm dòng này để tránh lỗi nếu db đã có sẵn dữ liệu

server:
  port: 8080

logging:
  level:
    root: DEBUG
  file:
    name: logs/app.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
